name: Automation - Strike Price Finder

on:
  workflow_dispatch:
  schedule:
    - cron: "30 11 * * 3,6"

jobs:
  run-strike-price-finder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run strike price finder
        run: python script/strike_price_finder.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: strike-price-results
          path: |
            stock_data.xlsx
            error_symbols.csv
